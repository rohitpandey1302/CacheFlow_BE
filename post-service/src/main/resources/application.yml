server:
  port: 8081

spring:
  application:
    name: post-service

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        default_batch_fetch_size: 100

  datasource:
    url: jdbc:mysql://localhost:3306/cacheflow_db
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000